services:
  openclaw-gateway:
    build:
      context: .
      args:
        - OPENCLAW_VERSION=main
    image: ghcr.io/flyzstu/openclaw-docker:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    stdin_open: true
    tty: true
    # 如果在 Synology NAS 或其他存在 UID/GID 权限问题的系统上运行，请取消注释下一行
    # user: "1000:1000"
    volumes:
      - ~/.openclaw:/home/node/.openclaw
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway"]

  openclaw-cli:
    build:
      context: .
      args:
        - OPENCLAW_VERSION=main
    image: ghcr.io/flyzstu/openclaw-docker:latest
    container_name: openclaw-cli
    stdin_open: true
    tty: true
    volumes:
      - ~/.openclaw:/home/node/.openclaw
    environment:
      - NODE_ENV=production
    entrypoint: ["bunx", "openclaw"]
    profiles:
      - cli
